<!DOCTYPE html>
<html>
<head>
  <title>PROJECT DARKSTATE // TERMINAL</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="header">
  <p>Welcome to the Project Darkstate Database</p>
  <p>You're logged in as: <span id="user">Guest</span></p>
  <p id="time"></p>
</div>

<div id="output"></div>

<div id="input-line">
  <span>[ Guest@s80.host : ~ ]</span>
  <input id="cmd" autofocus />
</div>

<script>
const input = document.getElementById("cmd");
const output = document.getElementById("output");

function updateTime() {
  const now = new Date();
  document.getElementById("time").textContent =
    "Date: " + now.toLocaleDateString() + " | Time: " + now.toLocaleTimeString();
}
setInterval(updateTime, 1000);
updateTime();

// Terminal commands
const commands = {
  help: "Commands: help, database, status, logout",
  status: "SYSTEM ONLINE // PROJECT DARKSTATE ACTIVE",
  logout: () => window.location.href = "index.html"
};

input.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {

    const cmd = input.value.trim();

    // show typed command
    const line = document.createElement("p");
    line.textContent = "[ Guest@s80.host : ~ ] " + cmd;
    output.appendChild(line);

    // handle command
    if (cmd === "database") {
      showDatabase();
    } 
    else if (commands[cmd]) {
      const res = document.createElement("p");
      res.textContent =
        typeof commands[cmd] === "function"
          ? commands[cmd]()
          : commands[cmd];
      output.appendChild(res);
    } 
    else {
      const res = document.createElement("p");
      res.textContent = "UNKNOWN COMMAND";
      output.appendChild(res);
    }

    input.value = "";
    window.scrollTo(0, document.body.scrollHeight);
  }
});

// DATABASE SYSTEM
function showDatabase() {
  const db = document.createElement("div");
  db.innerHTML = `
    <p>--- NODE DATABASE ACCESS GRANTED ---</p>
    <ul>
      <li><a href="pages/node-alpha.html">NODE-ALPHA</a></li>
      <li><a href="pages/node-beta.html">NODE-BETA</a></li>
      <li><a href="pages/node-gamma.html">NODE-GAMMA</a></li>
    </ul>
  `;
  output.appendChild(db);
}
</script>

</body>
</html>
